services:
  db:
    image: pgvector/pgvector:pg16
    container_name: sa-assessment-db
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: api
    container_name: sa-assessment-api
    ports:
      - "8080:8080"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://appuser:localdev@db:5432/appdb
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
