[loggers]
keys=root,src,botocore,urllib3,pydantic,uvicorn,uvicorn.access,uvicorn.error

[handlers]
keys=console

[formatters]
keys=text,json

[logger_root]
level=WARNING
handlers=console

[logger_src]
level=INFO
handlers=console
qualname=src
propagate=0

[logger_botocore]
level=WARNING
handlers=console
qualname=botocore
propagate=0

[logger_urllib3]
level=WARNING
handlers=console
qualname=urllib3
propagate=0

[logger_pydantic]
level=WARNING
handlers=console
qualname=pydantic
propagate=0

[logger_uvicorn]
level=INFO
handlers=console
qualname=uvicorn
propagate=0

[logger_uvicorn.access]
level=INFO
handlers=console
qualname=uvicorn.access
propagate=0

[logger_uvicorn.error]
level=INFO
handlers=console
qualname=uvicorn.error
propagate=0

[handler_console]
class=StreamHandler
level=DEBUG
formatter=text
args=(sys.stdout,)

[formatter_text]
class=common.logging_config.TextFormatter
format=%(asctime)s %(levelname)-8s %(name)s - %(message)s
datefmt=%Y-%m-%dT%H:%M:%SZ

[formatter_json]
class=common.logging_config.JsonFormatter
format=%(message)s
datefmt=%Y-%m-%dT%H:%M:%SZ
