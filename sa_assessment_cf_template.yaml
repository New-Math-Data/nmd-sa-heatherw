AWSTemplateFormatVersion: "2010-09-09"
Description: Creates VPC, RDS PostgreSQL with pgvector, ECR, S3, IAM user, and restricted policy for an SA assessment candidate.

Parameters:
  CandidateName:
    Type: String
    Description: The candidate name used to namespace all resources
    AllowedPattern: "[a-z0-9-]+"

Resources:
  # ============================================================
  # IAM User + Policy
  # ============================================================
  IAMUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Ref CandidateName
      Tags:
        - Key: Owner
          Value: !Ref CandidateName

  RestrictedPolicy:
    Type: AWS::IAM::ManagedPolicy
    DependsOn: IAMUser
    Properties:
      ManagedPolicyName: !Sub "${CandidateName}-sa-restricted-policy"
      Users:
        - !Ref CandidateName
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowResourceCreationTagged
            Effect: Allow
            Action:
              - ecs:CreateCluster
              - ecs:CreateService
              - elasticloadbalancing:CreateLoadBalancer
              - elasticloadbalancing:CreateTargetGroup
              - ec2:CreateSecurityGroup
              - logs:CreateLogGroup
            Resource: "*"
            Condition:
              StringEquals:
                "aws:RequestTag/Owner": !Ref CandidateName
          - Sid: AllowResourceCreationUntaggable
            Effect: Allow
            Action:
              - ecs:RegisterTaskDefinition
              - elasticloadbalancing:CreateListener
              - elasticloadbalancing:CreateRule
            Resource: "*"
          - Sid: AllowMutateOwnTaggedResources
            Effect: Allow
            Action:
              - ecs:UpdateService
              - ecs:DeleteService
              - ecs:DeleteCluster
              - ecs:DeleteTaskDefinitions
              - ecs:StopTask
              - ecs:RunTask
              - ecs:TagResource
              - ecs:UntagResource
              - ecs:DeregisterTaskDefinition
              - elasticloadbalancing:DeleteLoadBalancer
              - elasticloadbalancing:DeleteTargetGroup
              - elasticloadbalancing:DeleteListener
              - elasticloadbalancing:DeleteRule
              - elasticloadbalancing:ModifyLoadBalancerAttributes
              - elasticloadbalancing:ModifyTargetGroupAttributes
              - elasticloadbalancing:ModifyListener
              - elasticloadbalancing:ModifyRule
              - elasticloadbalancing:SetSecurityGroups
              - elasticloadbalancing:SetSubnets
              - elasticloadbalancing:RegisterTargets
              - elasticloadbalancing:DeregisterTargets
              - elasticloadbalancing:AddTags
              - elasticloadbalancing:RemoveTags
              - ec2:AuthorizeSecurityGroupIngress
              - ec2:AuthorizeSecurityGroupEgress
              - ec2:RevokeSecurityGroupIngress
              - ec2:RevokeSecurityGroupEgress
              - ec2:DeleteSecurityGroup
              - logs:DeleteLogGroup
              - logs:PutRetentionPolicy
              - logs:TagLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
              - logs:TagResource
              - logs:UntagResource
            Resource: "*"
            Condition:
              StringEquals:
                "aws:ResourceTag/Owner": !Ref CandidateName
          - Sid: AllowDescribeActions
            Effect: Allow
            Action:
              - ecs:DescribeClusters
              - ecs:DescribeServices
              - ecs:DescribeTaskDefinition
              - ecs:DescribeTasks
              - ecs:ListClusters
              - ecs:ListServices
              - ecs:ListTasks
              - ecs:ListTaskDefinitions
              - elasticloadbalancing:DescribeLoadBalancers
              - elasticloadbalancing:DescribeLoadBalancerAttributes
              - elasticloadbalancing:DescribeTargetGroups
              - elasticloadbalancing:DescribeTargetGroupAttributes
              - elasticloadbalancing:DescribeTargetHealth
              - elasticloadbalancing:DescribeListeners
              - elasticloadbalancing:DescribeRules
              - elasticloadbalancing:DescribeTags
              - ec2:DescribeSecurityGroups
              - ec2:DescribeSecurityGroupRules
              - ec2:DescribeVpcs
              - ec2:DescribeSubnets
              - ec2:DescribeNetworkInterfaces
              - ec2:DescribeAvailabilityZones
              - ec2:DescribeInternetGateways
              - ec2:DescribeAccountAttributes
              - logs:DescribeLogGroups
              - logs:DescribeLogStreams
              - logs:GetLogEvents
              - logs:ListTagsForResource
              - cloudwatch:PutMetricData
              - cloudwatch:GetMetricData
              - cloudwatch:ListMetrics
            Resource: "*"
          - Sid: AllowEC2Tagging
            Effect: Allow
            Action:
              - ec2:CreateTags
              - ec2:DeleteTags
            Resource: "*"
            Condition:
              StringEquals:
                "ec2:ResourceTag/Owner": !Ref CandidateName
          - Sid: AllowEC2TaggingOnCreate
            Effect: Allow
            Action:
              - ec2:CreateTags
            Resource: "*"
            Condition:
              StringEquals:
                "ec2:CreateAction": "CreateSecurityGroup"
          - Sid: AllowECRReadAndPush
            Effect: Allow
            Action:
              - ecr:GetAuthorizationToken
            Resource: "*"
          - Sid: AllowECRRepositoryAccess
            Effect: Allow
            Action:
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
              - ecr:BatchCheckLayerAvailability
              - ecr:PutImage
              - ecr:InitiateLayerUpload
              - ecr:UploadLayerPart
              - ecr:CompleteLayerUpload
              - ecr:DescribeRepositories
              - ecr:DescribeImages
              - ecr:ListImages
              - ecr:ListTagsForResource
              - ecr:CreateRepository
              - ecr:DeleteRepository
              - ecr:TagResource
            Resource:
              - !GetAtt ECRRepository.Arn
              - !Sub "arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/nmd-sa-${CandidateName}-*"
          - Sid: AllowPassRole
            Effect: Allow
            Action:
              - iam:PassRole
            Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/nmd-sa-${CandidateName}-*"
          - Sid: AllowIAMRoleManagement
            Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:GetRole
              - iam:ListRolePolicies
              - iam:ListAttachedRolePolicies
              - iam:ListInstanceProfilesForRole
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:GetRolePolicy
              - iam:TagRole
              - iam:UntagRole
            Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/nmd-sa-${CandidateName}-*"
          - Sid: AllowS3StateBucket
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:ListBucket
              - s3:GetBucketVersioning
              - s3:GetBucketLocation
            Resource:
              - !GetAtt StateBucket.Arn
              - !Sub "${StateBucket.Arn}/*"
          - Sid: AllowSecretsManagerRead
            Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
              - secretsmanager:DescribeSecret
            Resource: !GetAtt RDSInstance.MasterUserSecret.SecretArn
          - Sid: AllowBedrockInvoke
            Effect: Allow
            Action:
              - bedrock:InvokeModel
              - bedrock:InvokeModelWithResponseStream
            Resource:
              - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0"
              - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-sonnet-20240229-v1:0"
              - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-haiku-20240307-v1:0"

  # ============================================================
  # VPC + Networking
  # ============================================================
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "nmd-sa-${CandidateName}-vpc"
        - Key: Owner
          Value: !Ref CandidateName

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "nmd-sa-${CandidateName}-igw"
        - Key: Owner
          Value: !Ref CandidateName

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: us-west-2a
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "nmd-sa-${CandidateName}-public-1"
        - Key: Owner
          Value: !Ref CandidateName

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: us-west-2b
      CidrBlock: 10.0.2.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "nmd-sa-${CandidateName}-public-2"
        - Key: Owner
          Value: !Ref CandidateName

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: us-west-2a
      CidrBlock: 10.0.3.0/24
      Tags:
        - Key: Name
          Value: !Sub "nmd-sa-${CandidateName}-private-1"
        - Key: Owner
          Value: !Ref CandidateName

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: us-west-2b
      CidrBlock: 10.0.4.0/24
      Tags:
        - Key: Name
          Value: !Sub "nmd-sa-${CandidateName}-private-2"
        - Key: Owner
          Value: !Ref CandidateName

  # NAT Gateway (in public subnet 1)
  NatGatewayEIP:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "nmd-sa-${CandidateName}-nat-eip"
        - Key: Owner
          Value: !Ref CandidateName

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayEIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub "nmd-sa-${CandidateName}-nat"
        - Key: Owner
          Value: !Ref CandidateName

  # Public Route Table
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "nmd-sa-${CandidateName}-public-rt"
        - Key: Owner
          Value: !Ref CandidateName

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # Private Route Table
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "nmd-sa-${CandidateName}-private-rt"
        - Key: Owner
          Value: !Ref CandidateName

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # ============================================================
  # RDS PostgreSQL 16 with pgvector
  # ============================================================
  RDSSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub "Subnet group for nmd-sa-${CandidateName} RDS"
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      Tags:
        - Key: Name
          Value: !Sub "nmd-sa-${CandidateName}-rds-subnet-group"
        - Key: Owner
          Value: !Ref CandidateName

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "Security group for nmd-sa-${CandidateName} RDS"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 10.0.0.0/16
      Tags:
        - Key: Name
          Value: !Sub "nmd-sa-${CandidateName}-rds-sg"
        - Key: Owner
          Value: !Ref CandidateName

  RDSParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Family: postgres16
      Description: !Sub "Parameter group for nmd-sa-${CandidateName} with pgvector"
      Tags:
        - Key: Name
          Value: !Sub "nmd-sa-${CandidateName}-pg-params"
        - Key: Owner
          Value: !Ref CandidateName

  RDSInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    Properties:
      DBInstanceIdentifier: !Sub "nmd-sa-${CandidateName}-db"
      DBInstanceClass: db.t3.micro
      Engine: postgres
      EngineVersion: "16"
      DBName: sa_assessment
      MasterUsername: postgres
      ManageMasterUserPassword: true
      AllocatedStorage: 20
      StorageType: gp3
      DBSubnetGroupName: !Ref RDSSubnetGroup
      VPCSecurityGroups:
        - !GetAtt RDSSecurityGroup.GroupId
      DBParameterGroupName: !Ref RDSParameterGroup
      PubliclyAccessible: false
      MultiAZ: false
      DeletionProtection: false
      DeleteAutomatedBackups: true
      BackupRetentionPeriod: 0
      Tags:
        - Key: Name
          Value: !Sub "nmd-sa-${CandidateName}-rds"
        - Key: Owner
          Value: !Ref CandidateName

  # ============================================================
  # ECR Repository
  # ============================================================
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "nmd-sa-${CandidateName}"
      Tags:
        - Key: Owner
          Value: !Ref CandidateName

  # ============================================================
  # S3 Bucket (Terraform state, versioning enabled)
  # ============================================================
  StateBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "nmd-sa-${CandidateName}-tf-state"
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Owner
          Value: !Ref CandidateName

# ============================================================
# Outputs
# ============================================================
Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref VPC

  PublicSubnetIds:
    Description: Comma-separated public subnet IDs
    Value: !Join [",", [!Ref PublicSubnet1, !Ref PublicSubnet2]]

  PrivateSubnetIds:
    Description: Comma-separated private subnet IDs
    Value: !Join [",", [!Ref PrivateSubnet1, !Ref PrivateSubnet2]]

  RdsEndpoint:
    Description: RDS instance endpoint address
    Value: !GetAtt RDSInstance.Endpoint.Address

  RdsPort:
    Description: RDS instance port
    Value: !GetAtt RDSInstance.Endpoint.Port

  RdsDatabaseName:
    Description: RDS database name
    Value: sa_assessment

  RdsSecretArn:
    Description: ARN of the RDS master user secret managed by RDS
    Value: !GetAtt RDSInstance.MasterUserSecret.SecretArn

  EcrRepositoryUri:
    Description: ECR repository URI
    Value: !GetAtt ECRRepository.RepositoryUri

  StateBucketName:
    Description: S3 bucket name for Terraform state
    Value: !Ref StateBucket

  CandidateIamUserArn:
    Description: ARN of the candidate IAM user
    Value: !GetAtt IAMUser.Arn
